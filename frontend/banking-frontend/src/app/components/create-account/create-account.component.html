<div class="max-w-md mx-auto bg-white rounded-lg  p-8">
  <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">
    Create Your Account
  </h2>
  <!-- Angular's form binding is preserved -->
  <form (ngSubmit)="onSubmit()">
    <div class="mb-4">
      <label for="Account Type" class="block text-sm font-medium text-gray-700 mb-1"
        >Account Type</label
      >
      <select class="w-full px-3 py-2 border border-gray-300 rounded-md text-bold shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" name="accountType"  id="accountType" [(ngModel)]="accountType">
        <option value="savings">Savings Account</option>
        <option value="checking">Checking Account</option>
      </select>

    </div>

    <div>
      <button
        type="submit"
        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
      >
        Submit
      </button>
    </div>
  </form>
</div>
