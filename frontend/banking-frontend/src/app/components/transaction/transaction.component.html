<div *ngIf="transactionMessage" class="success-message mb-6 p-4 bg-green-100 border border-green-400 text-green-700 rounded">
  {{ transactionMessage }}
</div>

<div

  *ngFor="let account of accounts; let i = index"
  class="bg-white shadow-lg rounded-xl p-6 mb-8 border border-gray-200"
>
  <h2 class="text-2xl font-bold text-gray-800 border-b border-gray-200 pb-3 mb-4">
    {{ account.type | titlecase }} Account
  </h2>

  <div class="space-y-2 mb-6 text-gray-600">
    <p>
      <b class="font-semibold text-gray-700">ID:</b>
      <span class="font-mono bg-gray-100 px-2 py-1 rounded">{{ account._id }}</span>
    </p>
    <p>
      <b class="font-semibold text-gray-700">Number:</b> {{ account.accountNumber }}
    </p>
    <p>
      <b class="font-semibold text-gray-700">Balance:</b>
      <span class="font-semibold text-green-600 text-lg">{{ account.balance | currency:'USD' }}</span>
    </p>
  </div>

  <div class="space-y-6">
    <div class="grid grid-cols-1 sm:grid-cols-[auto_1fr_auto] sm:items-center gap-3">
      <label for="deposit_{{ i }}" class="font-medium text-gray-700">Deposit:</label>
      <input
        id="deposit_{{ i }}"
        type="number"
        [(ngModel)]="account.deposit_amount"
        name="deposit_{{ i }}"
        placeholder="Amount"
        class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
      />
      <button
        (click)="deposit(account._id, account.deposit_amount)"
        class="w-full sm:w-auto px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-md shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
      >
        Deposit
      </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-[auto_1fr_auto] sm:items-center gap-3">
      <label for="withdraw_{{ i }}" class="font-medium text-gray-700">Withdraw:</label>
      <input
        id="withdraw_{{ i }}"
        type="number"
        [(ngModel)]="account.withdraw_amount"
        name="withdraw_{{ i }}"
        placeholder="Amount"
        class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
      />
      <button
        (click)="withdraw(account._id, account.withdraw_amount)"
        class="w-full sm:w-auto px-4 py-2 text-sm font-medium text-white bg-red-600 border border-transparent rounded-md shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500"
      >
        Withdraw
      </button>
    </div>

    <div class="bg-gray-50 p-4 rounded-lg border">
      <div class="grid grid-cols-1 sm:grid-cols-[auto_1fr_1fr_auto] sm:items-center gap-3">
        <label for="transfer_{{ i }}" class="font-medium text-gray-700">Transfer:</label>
        <input
          id="transfer_{{ i }}"
          type="number"
          [(ngModel)]="account.transfer_amount"
          name="transfer_{{ i }}"
          placeholder="Amount"
          class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
        />
        <input
          type="text"
          [(ngModel)]="account.toAccountId"
          name="toAccount_{{ i }}"
          placeholder="To Account ID"
          class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
        />
        <button
          (click)="transfer(account._id, account.toAccountId, account.transfer_amount)"
          class="w-full sm:w-auto px-4 py-2 text-sm font-medium text-white bg-indigo-600 border border-transparent rounded-md shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        >
          Transfer
        </button>
      </div>
    </div>
  </div>
</div>
